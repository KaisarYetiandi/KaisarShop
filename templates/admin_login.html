{% extends "base.html" %}
{% block title %}Admin Sign In — KaisarShop{% endblock %}
{% block content %}
<div class="admin-login-layout">
    <div class="auth-wrap auth-panel">
        <p class="eyebrow">Administrator Access</p>
        <h1>Sign In</h1>
        <p class="help-text">Log in to manage products, orders, and buyers.</p>
        <form method="post">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="off">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
